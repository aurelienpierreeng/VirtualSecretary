name: Deploy MkDocs

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs: 
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r recipe/requirements.txt
          pip install -r recipe/requirements-dev.txt
          pip install -r recipe/requirements-email.txt
          python download.py

      - name: Build documentation
        run: mkdocs build --strict

      - name: Inspect sitemap
        run: |
          ls -lah site/
          echo "===================="
          cat site/sitemap.xml

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
